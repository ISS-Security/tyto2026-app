---
# Rename file to secrets.yml to get started for development or test

# Redis URL: set ONE of REDISCLOUD_URL or REDIS_URL, depending on which
# add-on you've provisioned. Redis Cloud (`rediscloud:30`, free tier)
# exposes REDISCLOUD_URL; Heroku Redis (`heroku-redis:mini` and up)
# exposes REDIS_URL. Code reads whichever is non-nil (Redis Cloud first).

development:
  API_URL: http://localhost:3000/api/v1
  APP_URL: http://localhost:9292
  SESSION_SECRET: <`rake generate:session_secret`>
  MSG_KEY: <`rake newkey:msg`>
  REDISCLOUD_URL: redis://localhost:6379/0
  # REDIS_URL: redis://localhost:6379/0

test:
  API_URL: http://localhost:3000/api/v1
  APP_URL: http://localhost:9292
  SESSION_SECRET: <`rake generate:session_secret`>
  MSG_KEY: <`rake newkey:msg`>
  REDISCLOUD_URL: redis://localhost:6379/0
  # REDIS_URL: redis://localhost:6379/0

production:
  API_URL: <provisioned API URL (ending with /api/v1)>
  APP_URL: <provisioned app URL (root without trailing slash)>
  SESSION_SECRET: <`rake generate:session_secret`>
  MSG_KEY: <`rake newkey:msg`>
  REDISCLOUD_URL: <set by `rediscloud` add-on>
  # REDIS_URL: <set by `heroku-redis` add-on>
